<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEFLIX - Book Your Movie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Landing Section with Projector Reveal -->
    <section class="landing">
        <div class="overlay">
            <h1 class="logo">CINEFLIX</h1>
            <p class="tagline">Book. Watch. Experience.</p>
            <a href="#movies">
                <button class="book-btn">BOOK NOW</button>
            </a>
            
        </div>
        <canvas id="revealCanvas"></canvas>
    </section>

    <!-- Movies Section -->
    <section class="movies" id="movies">
        <h2>NOW SHOWING</h2>
        <div class="movie-grid">
            <div class="movie-card" data-movie="Dune 3">
                <img src="https://image.tmdb.org/t/p/w500/8b8R8l88Qje9dn9OE8PY05Nxl1X.jpg" alt="Dune 3">
                <div class="movie-info">
                    <h3>Dune: Part Three</h3>
                    <p>Sci-Fi | 3h 10m | 8:00 PM</p>
                    <a href="select-seats.html?movie=Dune%203">
                    <button class="select-btn">Select Seats</button>
                    </a>
                </div>
            </div>

            <div class="movie-card" data-movie="Avatar 4">
                <img src="https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg" alt="Avatar 4">
                <div class="movie-info">
                    <h3>Avatar: The Seed Bearer</h3>
                    <p>Action | 2h 45m | 9:30 PM</p>
                    <a href="select-seats.html?movie=Avatar%204">
                    <button class="select-btn">Select Seats</button>
                    </a>
                </div>
            </div>

            <div class="movie-card" data-movie="Joker 3">
                <img src="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg" alt="Joker 3">
                <div class="movie-info">
                    <h3>Joker: Folie à Trois</h3>
                    <p>Thriller | 2h 20m | 7:15 PM</p>
                    <a href="select-seats.html?movie=Joker%203">
                    <button class="select-btn">Select Seats</button>
                    </a>
                </div>
            </div>

            <div class="movie-card" data-movie="Oppenheimer">
                <img src="https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" alt="Oppenheimer">
                <div class="movie-info">
                    <h3>Oppenheimer</h3>
                    <p>Drama | 3h 00m | 6:00 PM</p>
                    <a href="select-seats.html?movie=Oppenheimer%204">
                    <button class="select-btn">SELECT SEATS</button>
                    </a>
                </div>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
